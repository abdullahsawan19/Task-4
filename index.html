<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Task 1 -->
    <button onclick="displayDate()">Current Date</button>

    <!-- Task 2 -->
    <button onclick="openWindow()">Open</button>

    <!-- Task 4 -->
    <form action="">
      <div>
        <label for="userName">Name :</label>
        <input type="text" id="userName" name="userName" required />
      </div>
      <div>
        <label for="phone">Phone Number (8 digits) :</label>
        <input type="text" id="phone" name="phone" />
      </div>
      <div>
        <label for="mobile">Mobile Number (11 digits) :</label>
        <input type="text" id="mobile" name="mobile" />
      </div>
      <div>
        <label for="userEmail">Email :</label>
        <input type="email" id="userEmail" name="userEmail" />
      </div>
      <div>
        <label for="color">Color :</label>
        <input type="text" id="favColor" name="color" required />
      </div>

      <br /><br />
      <button type="submit" onclick="handelSubmit(event)">Submit</button>
    </form>

    <script src="main.js"></script>
  </body>
</html>
